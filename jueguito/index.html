<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Mortal Kombat Retro</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =====================================================
     ================= SELECTOR PERSONAJES ===============
     ===================================================== -->

<div id="characterSelect">

    <h1>MORTAL KOMBAT</h1>

    <div class="selectors">

        <!-- PLAYER 1 -->
        <div class="selectPanel">

            <h2>PLAYER 1</h2>

            <div id="p1Characters" class="characterGrid"></div>

            <!-- =========================================
     ========= STATS PLAYER 1 ================
     ========================================= -->

<div id="p1Stats" class="statsPanel">

    <h3>STATS</h3>

    <div class="statLine">
        HP:
        <span id="p1hp"></span>
    </div>

    <div class="statLine">
        MANA:
        <span id="p1mana"></span>
    </div>

    <div class="statLine">
        SPEED:
        <span id="p1speed"></span>
    </div>

    <div class="statLine">
        JUMP:
        <span id="p1jump"></span>
    </div>

    <div class="statLine">
        PUNCH:
        <span id="p1punch"></span>
    </div>

    <div class="statLine">
        KICK:
        <span id="p1kick"></span>
    </div>

    <div class="statLine">
        FIREBALL:
        <span id="p1fireball"></span>
    </div>

</div>

        </div>

        <!-- PLAYER 2 -->
        <div class="selectPanel">

            <h2>PLAYER 2</h2>

            <div id="p2Characters" class="characterGrid"></div>

            <!-- =========================================
     ========= STATS PLAYER 2 ================
     ========================================= -->

<div id="p2Stats" class="statsPanel">

    <h3>STATS</h3>

    <div class="statLine">
        HP:
        <span id="p2hp"></span>
    </div>

    <div class="statLine">
        MANA:
        <span id="p2mana"></span>
    </div>

    <div class="statLine">
        SPEED:
        <span id="p2speed"></span>
    </div>

    <div class="statLine">
        JUMP:
        <span id="p2jump"></span>
    </div>

    <div class="statLine">
        PUNCH:
        <span id="p2punch"></span>
    </div>

    <div class="statLine">
        KICK:
        <span id="p2kick"></span>
    </div>

    <div class="statLine">
        FIREBALL:
        <span id="p2fireball"></span>
    </div>

</div>

        </div>

    </div>

    <button id="startBtn">START FIGHT</button>

</div>

<!-- =====================================================
     =================== JUEGO ============================
     ===================================================== -->

<div id="game">

    <!-- HUD -->
    <div class="hud">

        <div class="playerHud">

            <div id="p1Name">PLAYER 1</div>

            <div class="healthBar">
                <div class="health" id="health1"></div>
            </div>

            <div class="manaBar">
                <div class="mana" id="mana1"></div>
            </div>

        </div>

        <div id="vs">VS</div>

        <div class="playerHud">

            <div id="p2Name">PLAYER 2</div>

            <div class="healthBar">
                <div class="health" id="health2"></div>
            </div>

            <div class="manaBar">
                <div class="mana" id="mana2"></div>
            </div>

        </div>

    </div>

    <!-- PERSONAJES -->
    <div id="player1" class="fighter"></div>
    <div id="player2" class="fighter"></div>

    <!-- PISO -->
    <div id="ground"></div>

</div>

<script src="script.js"></script>

</body>
</html>
